<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Capture Ukraine GTA V | Universal</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0c;
            --panel: rgba(20, 20, 23, 0.95);
            --accent: #3498db;
            --families: #2ecc71;
            --ballas: #9b59b6;
            --vagos: #f1c40f;
            --marabunta: #3498db;
            --text: #ffffff;
            --text-dim: #888891;
            --border: rgba(255, 255, 255, 0.08);
        }

        * { box-sizing: border-box; transition: all 0.2s ease; }

        body {
            font-family: 'Montserrat', sans-serif;
            background: var(--bg) url('https://i.imgur.com/G0NfX2n.jpeg') no-repeat center center fixed;
            background-size: cover;
            color: var(--text);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- Sidebar --- */
        .sidebar {
            width: 280px;
            background: var(--panel);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            z-index: 1000;
            backdrop-filter: blur(15px);
        }

        .sidebar-header { padding: 30px 20px; text-align: center; border-bottom: 1px solid var(--border); }
        .sidebar-header img { width: 80px; height: 80px; border-radius: 50%; border: 2px solid var(--accent); margin-bottom: 10px; }
        
        .nav-list { list-style: none; padding: 20px 10px; margin: 0; flex-grow: 1; }
        .nav-item {
            padding: 14px 20px; margin-bottom: 5px; border-radius: 10px;
            cursor: pointer; display: flex; align-items: center; gap: 12px;
            color: var(--text-dim); font-weight: 600;
        }
        .nav-item:hover { background: rgba(255,255,255,0.05); color: #white; }
        .nav-item.active { background: var(--accent); color: white; }

        /* --- Main Content --- */
        .main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }

        /* --- Top Bar (Mobile) --- */
        .mobile-header {
            display: none; background: var(--panel); padding: 15px;
            justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border);
        }

        /* --- Statistics --- */
        .stats-bar {
            display: flex; gap: 15px; padding: 20px; overflow-x: auto;
            background: rgba(0,0,0,0.4); backdrop-filter: blur(5px);
        }
        .stat-card {
            min-width: 160px; background: var(--panel); padding: 12px 20px;
            border-radius: 12px; border-left: 4px solid #fff;
        }

        /* --- Map Viewport --- */
        .map-container { flex: 1; overflow: auto; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .map-layout { display: flex; gap: 40px; padding: 20px; min-width: max-content; }
        .grid-cluster { display: grid; grid-template-columns: repeat(6, 46px); gap: 6px; }

        /* --- Cell Style --- */
        .cell {
            width: 46px; height: 46px; background: rgba(255,255,255,0.05);
            border: 1px solid var(--border); border-radius: 6px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; position: relative; font-size: 18px;
        }
        .cell:hover { transform: scale(1.1); z-index: 10; border-color: white; }
        .cell .id { position: absolute; top: 2px; left: 4px; font-size: 8px; opacity: 0.6; }

        .fam { background: var(--families) !important; color: #000; }
        .bal { background: var(--ballas) !important; color: #fff; }
        .vag { background: var(--vagos) !important; color: #000; }
        .mar { background: var(--marabunta) !important; color: #fff; }

        /* --- Modals & Forms --- */
        .overlay {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85);
            z-index: 2000; align-items: center; justify-content: center; padding: 20px;
        }
        .modal {
            background: #1a1a1d; width: 100%; max-width: 400px; padding: 30px;
            border-radius: 20px; border: 1px solid var(--border); box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        input, select, button {
            width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px;
            border: 1px solid var(--border); background: #111; color: white;
        }
        button.primary { background: var(--accent); border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; }

        /* --- Mobile Adaptivity --- */
        @media (max-width: 850px) {
            .sidebar {
                position: fixed; left: -280px; top: 0; bottom: 0;
                transition: 0.3s ease;
            }
            .sidebar.open { left: 0; }
            .mobile-header { display: flex; }
            .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 999; }
            .sidebar-overlay.show { display: block; }
        }
    </style>
</head>
<body>

    <div class="sidebar-overlay" id="sb-overlay" onclick="toggleSidebar()"></div>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <img src="https://i.imgur.com/8K6rX3X.png" alt="Logo">
            <h3 id="u-gang">Marabunta</h3>
            <span style="font-size: 11px; color: var(--text-dim);" id="u-name">Matthew Reiss (Admin)</span>
        </div>
        <ul class="nav-list">
            <li class="nav-item active" onclick="showSec('map')">⚔ Захоплення</li>
            <li class="nav-item" onclick="showSec('cabinet')">👑 Кабінет</li>
            <li class="nav-item" onclick="showSec('history')">🕘 Історія</li>
            <li id="adm-nav" class="nav-item" style="display:none;" onclick="showSec('admin')">⚙ Адмін</li>
        </ul>
        <div style="padding: 20px;">
            <button onclick="location.reload()" style="background: #222; border: 1px solid #444;">ВИЙТИ</button>
        </div>
    </aside>

    <div class="main-content">
        <header class="mobile-header">
            <button onclick="toggleSidebar()" style="background:none; border:none; color:white; font-size:24px;">☰</button>
            <span style="font-weight:bold; letter-spacing:1px;">CAPTURE UKRAINE</span>
            <div style="width:24px;"></div>
        </header>

        <div class="stats-bar">
            <div class="stat-card" style="border-color: var(--families)">Families: <b id="cnt-fam">0</b></div>
            <div class="stat-card" style="border-color: var(--ballas)">Ballas: <b id="cnt-bal">0</b></div>
            <div class="stat-card" style="border-color: var(--vagos)">Vagos: <b id="cnt-vag">0</b></div>
            <div class="stat-card" style="border-color: var(--marabunta)">Marabunta: <b id="cnt-mar">0</b></div>
        </div>

        <section id="sec-map" class="map-container">
            <div class="map-layout">
                <div class="grid-cluster" id="cluster-1"></div>
                <div class="grid-cluster" id="cluster-2"></div>
            </div>
        </section>

        <section id="sec-cabinet" style="display:none; padding: 20px; overflow-y:auto;">
            <h2>Активні операції</h2>
            <button class="primary" onclick="openModal('modal-capt')">+ Створити новий капт</button>
            <div id="capt-list" style="margin-top:20px;"></div>
        </section>

        <section id="sec-history" style="display:none; padding: 20px; overflow-y:auto;">
            <h2>Історія захоплень</h2>
            <div id="hist-list"></div>
        </section>

        <section id="sec-admin" style="display:none; padding: 20px; overflow-y:auto;">
            <h2>Адмін-панель</h2>
            <div id="user-list"></div>
        </section>
    </div>

    <div class="overlay" id="modal-paint">
        <div class="modal">
            <h3>Територія №<span id="target-id">0</span></h3>
            <label>Власник:</label>
            <select id="p-gang">
                <option value="none">Ніхто</option>
                <option value="families">Families</option>
                <option value="ballas">Ballas</option>
                <option value="vagos">Vagos</option>
                <option value="marabunta">Marabunta</option>
            </select>
            <label>Тип:</label>
            <select id="p-type">
                <option value="☠">☠ Звичайна</option>
                <option value="🔒">🔒 Заблокована</option>
                <option value="🏰">🏰 Титул</option>
            </select>
            <button class="primary" onclick="applyPaint()">ЗБЕРЕГТИ</button>
            <button onclick="closeModal()" style="background:#333;">СКАСУВАТИ</button>
        </div>
    </div>

    <div class="overlay" id="modal-capt">
        <div class="modal">
            <h3>Нове захоплення</h3>
            <input type="number" id="c-terr" placeholder="№ Території">
            <select id="c-def">
                <option value="families">Захист: Families</option>
                <option value="ballas">Захист: Ballas</option>
                <option value="vagos">Захист: Vagos</option>
                <option value="marabunta">Захист: Marabunta</option>
            </select>
            <input type="text" id="c-form" placeholder="Формат (н-р: 15х15)">
            <input type="time" id="c-time">
            <button class="primary" onclick="submitCapt()">СТВОРИТИ</button>
            <button onclick="closeModal()" style="background:#333;">СКАСУВАТИ</button>
        </div>
    </div>

    <script>
        // Data Handling
        const bc = new BroadcastChannel('gtav_sync');
        let territories = JSON.parse(localStorage.getItem('gt_t')) || Array.from({length:77}, (_,i)=>({id:i+1, gang:'none', type:'☠'}));
        let captures = JSON.parse(localStorage.getItem('gt_c')) || [];
        
        // Для демонстрації - адмін по замовчуванню
        const user = { role: 'admin', gang: 'marabunta', name: 'Matthew Reiss' };

        function init() {
            if(user.role === 'admin') document.getElementById('adm-nav').style.display = 'flex';
            renderMap();
            renderStats();
            renderCaptures();
            renderHistory();
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('sb-overlay').classList.toggle('show');
        }

        function showSec(id) {
            ['map','cabinet','history','admin'].forEach(s => document.getElementById('sec-'+s).style.display = 'none');
            document.getElementById('sec-'+id).style.display = (id === 'map') ? 'flex' : 'block';
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            event.currentTarget.classList.add('active');
            if(window.innerWidth < 850) toggleSidebar();
        }

        function renderMap() {
            const c1 = document.getElementById('cluster-1');
            const c2 = document.getElementById('cluster-2');
            c1.innerHTML = ''; c2.innerHTML = '';

            territories.forEach((t, index) => {
                const cell = document.createElement('div');
                cell.className = `cell ${t.gang !== 'none' ? t.gang.substring(0,3) : ''}`;
                cell.innerHTML = `<span class="id">${t.id}</span>${t.type}`;
                cell.onclick = () => { if(user.role === 'admin') openPaint(t.id) };
                (index < 42) ? c1.appendChild(cell) : c2.appendChild(cell);
            });
        }

        function renderStats() {
            const counts = { families: 0, ballas: 0, vagos: 0, marabunta: 0 };
            territories.forEach(t => { if(counts[t.gang] !== undefined) counts[t.gang]++; });
            document.getElementById('cnt-fam').innerText = counts.families;
            document.getElementById('cnt-bal').innerText = counts.ballas;
            document.getElementById('cnt-vag').innerText = counts.vagos;
            document.getElementById('cnt-mar').innerText = counts.marabunta;
        }

        function openPaint(id) {
            document.getElementById('target-id').innerText = id;
            document.getElementById('modal-paint').style.display = 'flex';
        }

        function applyPaint() {
            const id = parseInt(document.getElementById('target-id').innerText);
            const t = territories.find(x => x.id === id);
            t.gang = document.getElementById('p-gang').value;
            t.type = document.getElementById('p-type').value;
            save();
            closeModal();
        }

        function submitCapt() {
            const c = {
                id: Date.now(),
                terr: document.getElementById('c-terr').value,
                attacker: user.gang,
                defender: document.getElementById('c-def').value,
                time: document.getElementById('c-time').value,
                status: 'active'
            };
            captures.push(c);
            save();
            closeModal();
        }

        function renderCaptures() {
            const list = document.getElementById('capt-list');
            list.innerHTML = '';
            captures.filter(c => c.status === 'active').forEach(c => {
                list.innerHTML += `<div style="background:rgba(255,255,255,0.05); padding:15px; border-radius:10px; margin-bottom:10px; border-left:4px solid var(--accent)">
                    <b>${c.attacker.toUpperCase()} vs ${c.defender.toUpperCase()}</b><br>
                    <small>Територія №${c.terr} | Час: ${c.time}</small>
                    <button onclick="finishCapt(${c.id})" style="width:auto; margin-left:20px; padding:5px 10px; font-size:10px;">Завершити</button>
                </div>`;
            });
        }

        function finishCapt(id) {
            const c = captures.find(x => x.id === id);
            c.status = 'finished';
            c.winner = prompt("Хто переміг?", c.attacker);
            save();
        }

        function renderHistory() {
            const list = document.getElementById('hist-list');
            list.innerHTML = captures.filter(c => c.status === 'finished').map(c => 
                `<div style="padding:10px; border-bottom:1px solid #333;">🏆 <b>${c.winner}</b> переміг у капті №${c.terr}</div>`
            ).join('');
        }

        function closeModal() { document.querySelectorAll('.overlay').forEach(o => o.style.display = 'none'); }
        function openModal(id) { document.getElementById(id).style.display = 'flex'; }

        function save() {
            localStorage.setItem('gt_t', JSON.stringify(territories));
            localStorage.setItem('gt_c', JSON.stringify(captures));
            bc.postMessage('sync');
            renderMap(); renderStats(); renderCaptures(); renderHistory();
        }

        bc.onmessage = () => {
            territories = JSON.parse(localStorage.getItem('gt_t'));
            captures = JSON.parse(localStorage.getItem('gt_c'));
            renderMap(); renderStats(); renderCaptures(); renderHistory();
        };

        init();
    </script>
</body>
</html>
