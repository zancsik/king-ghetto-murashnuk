<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Capture Ukraine | GTA V Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0c;
            --panel: #141417;
            --panel-light: #1c1c21;
            --accent: #3498db;
            --families: #2ecc71;
            --ballas: #9b59b6;
            --vagos: #f1c40f;
            --marabunta: #3498db;
            --danger: #e74c3c;
            --text: #e0e0e0;
            --text-muted: #888891;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
        }

        * { box-sizing: border-box; transition: all 0.2s ease; }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- Scrollbar --- */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--panel-light); border-radius: 10px; }

        /* --- Sidebar --- */
        .sidebar {
            width: 280px;
            background: var(--panel);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            z-index: 10;
        }

        .sidebar-header {
            padding: 40px 20px;
            text-align: center;
            background: linear-gradient(to bottom, rgba(52, 152, 219, 0.05), transparent);
        }

        .sidebar-header img {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            border: 3px solid var(--accent);
            padding: 5px;
            margin-bottom: 15px;
            filter: drop-shadow(0 0 10px var(--accent));
        }

        .sidebar-header h3 { font-family: 'Rajdhani', sans-serif; margin: 0; font-size: 22px; letter-spacing: 1px; }
        .user-badge { font-size: 11px; color: var(--text-muted); text-transform: uppercase; margin-top: 5px; display: block; }

        .nav-list { list-style: none; padding: 20px 10px; margin: 0; flex-grow: 1; }
        .nav-item {
            padding: 14px 20px;
            margin-bottom: 8px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text-muted);
            font-weight: 600;
            font-size: 14px;
        }

        .nav-item:hover { background: var(--glass); color: var(--text); }
        .nav-item.active { background: var(--accent); color: white; box-shadow: 0 4px 15px rgba(52, 152, 219, 0.3); }

        /* --- Main Content --- */
        .content { flex: 1; padding: 30px; overflow-y: auto; position: relative; }

        /* --- Stats Bar --- */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: var(--panel);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid var(--border);
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: ''; position: absolute; left: 0; top: 0; height: 100%; width: 4px;
        }

        .stat-card.fam::before { background: var(--families); }
        .stat-card.bal::before { background: var(--ballas); }
        .stat-card.vag::before { background: var(--vagos); }
        .stat-card.mar::before { background: var(--marabunta); }

        .stat-card h4 { margin: 0; font-size: 12px; color: var(--text-muted); text-transform: uppercase; }
        .stat-card .value { font-size: 28px; font-weight: 700; margin-top: 5px; font-family: 'Rajdhani'; }

        /* --- Map Styling --- */
        .map-wrapper {
            background: var(--panel);
            padding: 30px;
            border-radius: 24px;
            border: 1px solid var(--border);
            display: inline-block;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }

        .map-grid {
            display: grid;
            grid-template-columns: repeat(11, 52px);
            gap: 8px;
        }

        .cell {
            width: 52px;
            height: 52px;
            background: var(--panel-light);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 1px solid transparent;
            position: relative;
        }

        .cell:hover { transform: translateY(-3px); border-color: rgba(255,255,255,0.2); z-index: 2; }
        .cell .id { font-size: 9px; position: absolute; top: 4px; left: 6px; opacity: 0.5; font-weight: 700; }
        .cell .icon { font-size: 20px; }

        /* --- Forms & Buttons --- */
        input, select, textarea {
            background: var(--panel-light);
            border: 1px solid var(--border);
            color: white;
            padding: 12px 16px;
            border-radius: 10px;
            width: 100%;
            margin-bottom: 15px;
            font-family: inherit;
        }

        button {
            padding: 12px 24px;
            border-radius: 10px;
            border: none;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Rajdhani', sans-serif;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-main { background: var(--accent); color: white; }
        .btn-main:hover { filter: brightness(1.2); transform: translateY(-2px); }

        /* --- Auth Page --- */
        .auth-overlay {
            position: fixed; inset: 0; background: var(--bg); z-index: 1000;
            display: flex; align-items: center; justify-content: center;
            background-image: radial-gradient(circle at center, #1c1c21 0%, #0a0a0c 100%);
        }

        .auth-box {
            background: var(--panel);
            width: 380px;
            padding: 40px;
            border-radius: 24px;
            border: 1px solid var(--border);
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }

        .auth-box h2 { text-align: center; font-family: 'Rajdhani'; font-size: 32px; margin-bottom: 30px; }

        /* --- History Cards --- */
        .history-item {
            background: var(--panel);
            margin-bottom: 15px;
            padding: 20px;
            border-radius: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid var(--accent);
        }

        @media (max-width: 1000px) {
            .sidebar { width: 80px; }
            .sidebar-header h3, .user-badge, .nav-item span { display: none; }
            .map-grid { grid-template-columns: repeat(7, 45px); }
        }
    </style>
</head>
<body>

    <div id="auth-screen" class="auth-overlay">
        <div class="auth-box">
            <h2 id="auth-title">TERMINAL ACCESS</h2>
            <div id="auth-form">
                <input type="text" id="log" placeholder="ЛОГІН">
                <input type="password" id="pass" placeholder="ПАРОЛЬ">
                <select id="gang-select" style="display:none;">
                    <option value="families">THE FAMILIES</option>
                    <option value="ballas">THE BALLAS GANG</option>
                    <option value="vagos">NORTHSIDE VAGOS</option>
                    <option value="marabunta" selected>MARABUNTA GRANDE</option>
                </select>
                <button class="btn-main" style="width:100%" onclick="auth()">УВІЙТИ</button>
                <p style="text-align:center; font-size:12px; margin-top:20px; color:var(--text-muted); cursor:pointer" onclick="toggleReg()">
                    Немає аккаунту? Створити
                </p>
            </div>
        </div>
    </div>

    <nav class="sidebar">
        <div class="sidebar-header">
            <img src="https://i.imgur.com/8K6rX3X.png" id="u-img">
            <h3 id="u-gang">GANG NAME</h3>
            <span class="user-badge" id="u-role">Role</span>
        </div>
        <div class="nav-list">
            <div class="nav-item active" onclick="nav('map')">⚔ <span>Захоплення</span></div>
            <div class="nav-item" onclick="nav('cabinet')">👑 <span>Кабінет</span></div>
            <div class="nav-item" onclick="nav('history')">🕘 <span>Історія</span></div>
            <div class="nav-item" id="adm-btn" style="display:none" onclick="nav('admin')">⚙ <span>Адмін</span></div>
        </div>
        <div style="padding:20px">
            <button class="btn-main" style="width:100%; background:#222; font-size:12px" onclick="location.reload()">ВИХІД</button>
        </div>
    </nav>

    <main class="content">
        <section id="s-map">
            <div class="stats-grid">
                <div class="stat-card fam"><h4>Families</h4><div class="value" id="count-fam">0</div></div>
                <div class="stat-card bal"><h4>Ballas</h4><div class="value" id="count-bal">0</div></div>
                <div class="stat-card vag"><h4>Vagos</h4><div class="value" id="count-vag">0</div></div>
                <div class="stat-card mar"><h4>Marabunta</h4><div class="value" id="count-mar">0</div></div>
            </div>
            <div class="map-wrapper">
                <div class="map-grid" id="grid"></div>
            </div>
        </section>

        <section id="s-cabinet" style="display:none">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px">
                <h2>УПРАВЛІННЯ КАПТАМИ</h2>
                <button class="btn-main" onclick="openModal('capt-modal')">+ СТВОРТИ КАПТ</button>
            </div>
            <div id="active-list"></div>
        </section>

        <section id="s-history" style="display:none">
            <h2>АРХІВ ЗАХОПЛЕНЬ</h2>
            <div id="hist-list"></div>
        </section>

        <section id="s-admin" style="display:none">
            <h2>АДМІНІСТРУВАННЯ</h2>
            <div id="user-table"></div>
        </section>
    </main>

    <div id="paint-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:2000; align-items:center; justify-content:center;">
        <div class="auth-box">
            <h3>ТЕРИТОРІЯ №<span id="p-id">0</span></h3>
            <select id="p-gang">
                <option value="none">НІХТО</option>
                <option value="families">FAMILIES</option>
                <option value="ballas">BALLAS</option>
                <option value="vagos">VAGOS</option>
                <option value="marabunta">MARABUNTA</option>
            </select>
            <button class="btn-main" style="width:100%" onclick="applyPaint()">ЗБЕРЕГТИ</button>
            <button class="btn-main" style="width:100%; background:#333; margin-top:10px" onclick="this.parentElement.parentElement.style.display='none'">СКАСУВАТИ</button>
        </div>
    </div>

    <script>
        // Core Logic
        const bc = new BroadcastChannel('gta_capture_v5');
        let user = null;
        let territories = JSON.parse(localStorage.getItem('gt_terr')) || Array.from({length:77}, (_,i)=>({id:i+1, gang:'none', type:'☠'}));
        let captures = JSON.parse(localStorage.getItem('gt_caps')) || [];
        let isReg = false;

        function toggleReg() {
            isReg = !isReg;
            document.getElementById('auth-title').innerText = isReg ? 'REGISTRATION' : 'TERMINAL ACCESS';
            document.getElementById('gang-select').style.display = isReg ? 'block' : 'none';
        }

        function auth() {
            const l = document.getElementById('log').value;
            const p = document.getElementById('pass').value;
            const g = document.getElementById('gang-select').value;
            
            if(l === 'admin' && p === 'admin') user = {login:'Admin', role:'admin', gang:'marabunta'};
            else user = {login:l, role:'capt', gang:isReg ? g : 'marabunta'};
            
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('u-gang').innerText = user.gang.toUpperCase();
            document.getElementById('u-role').innerText = user.role;
            if(user.role === 'admin') document.getElementById('adm-btn').style.display = 'flex';
            render();
        }

        function render() {
            const g = document.getElementById('grid');
            g.innerHTML = '';
            const counts = {families:0, ballas:0, vagos:0, marabunta:0};

            territories.forEach(t => {
                const c = document.createElement('div');
                c.className = 'cell';
                const color = getComputedStyle(document.documentElement).getPropertyValue(`--${t.gang}`).trim();
                c.style.background = t.gang !== 'none' ? `linear-gradient(135deg, ${color}cc, ${color}66)` : 'var(--panel-light)';
                if(t.gang !== 'none') {
                    c.style.borderColor = color;
                    counts[t.gang]++;
                }
                c.innerHTML = `<span class="id">${t.id}</span><span class="icon">${t.type}</span>`;
                c.onclick = () => { if(user.role === 'admin') openPaint(t.id) };
                g.appendChild(c);
            });

            ['fam','bal','vag','mar'].forEach(k => {
                const key = k === 'fam'?'families':k==='bal'?'ballas':k==='vag'?'vagos':'marabunta';
                document.getElementById(`count-${k}`).innerText = counts[key];
            });
        }

        function openPaint(id) {
            document.getElementById('p-id').innerText = id;
            document.getElementById('paint-modal').style.display = 'flex';
        }

        function applyPaint() {
            const id = parseInt(document.getElementById('p-id').innerText);
            territories[id-1].gang = document.getElementById('p-gang').value;
            localStorage.setItem('gt_terr', JSON.stringify(territories));
            render();
            bc.postMessage('update');
            document.getElementById('paint-modal').style.display = 'none';
        }

        function nav(sec) {
            document.querySelectorAll('section').forEach(s => s.style.display = 'none');
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById(`s-${sec}`).style.display = 'block';
            event.currentTarget.classList.add('active');
        }

        bc.onmessage = () => {
            territories = JSON.parse(localStorage.getItem('gt_terr'));
            render();
        };
    </script>
</body>
</html>
